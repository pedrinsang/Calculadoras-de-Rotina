<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../assets/css/styles.css">
  <title>Modo Offline | Setor de Virologia</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      color: #333;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 600px;
    }

    h1 {
      color: #1b5e20;
    }
    button {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Você está offline</h1>
    <p>Alguns recursos podem não estar disponíveis sem conexão com a internet.</p>
    <p>Por favor, conecte-se à internet para acessar todos os conteúdos.</p>
    <button onclick="window.location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
